  exposes:
  - type: rest
    namespace: increase-rest
    port: 8080
    description: REST adapter for Increase API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/account-numbers
      name: account-numbers
      description: REST surface for account_numbers.
      operations:
      - method: GET
        name: listaccountnumbers
        description: List Account Numbers
        call: increase.listaccountnumbers
        with:
          cursor: rest.cursor
          limit: rest.limit
          status.in: rest.status.in
          ach_debit_status.in: rest.ach_debit_status.in
          account_id: rest.account_id
          created_at.after: rest.created_at.after
          created_at.before: rest.created_at.before
          created_at.on_or_after: rest.created_at.on_or_after
          created_at.on_or_before: rest.created_at.on_or_before
          idempotency_key: rest.idempotency_key
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createanaccountnumber
        description: Create an Account Number
        call: increase.createanaccountnumber
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-numbers/{account-number-id}
      name: account-numbers-account-number-id
      description: REST surface for account_numbers-account_number_id.
      operations:
      - method: GET
        name: retrieveanaccountnumber
        description: Retrieve an Account Number
        call: increase.retrieveanaccountnumber
        with:
          account_number_id: rest.account_number_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateanaccountnumber
        description: Update an Account Number
        call: increase.updateanaccountnumber
        with:
          account_number_id: rest.account_number_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-statements
      name: account-statements
      description: REST surface for account_statements.
      operations:
      - method: GET
        name: listaccountstatements
        description: List Account Statements
        call: increase.listaccountstatements
        with:
          cursor: rest.cursor
          limit: rest.limit
          account_id: rest.account_id
          statement_period_start.after: rest.statement_period_start.after
          statement_period_start.before: rest.statement_period_start.before
          statement_period_start.on_or_after: rest.statement_period_start.on_or_after
          statement_period_start.on_or_before: rest.statement_period_start.on_or_before
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-statements/{account-statement-id}
      name: account-statements-account-statement-id
      description: REST surface for account_statements-account_statement_id.
      operations:
      - method: GET
        name: retrieveanaccountstatement
        description: Retrieve an Account Statement
        call: increase.retrieveanaccountstatement
        with:
          account_statement_id: rest.account_statement_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-transfers
      name: account-transfers
      description: REST surface for account_transfers.
      operations:
      - method: GET
        name: listaccounttransfers
        description: List Account Transfers
        call: increase.listaccounttransfers
        with:
          cursor: rest.cursor
          limit: rest.limit
          account_id: rest.account_id
