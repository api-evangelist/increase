                      - in_person_address
                      - mailing_address
                      - text_phone_number
                      title: Visa Card Dispute User Submission Visa Card Dispute Chargeback User Submission Chargeback Details Consumer Canceled Recurring Transaction Merchant Contact Methods
                      type: object
