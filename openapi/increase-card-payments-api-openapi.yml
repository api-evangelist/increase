                      - magnetic_stripe_no_cvv
                      - optical_code
                      - integrated_circuit_card
                      - contactless
                      - credential_on_file
                      - magnetic_stripe
                      - contactless_magnetic_stripe
                      - integrated_circuit_card_no_cvv
