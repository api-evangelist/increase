        processing_category:
          description: The processing category describes the intent behind the authorization, such as whether it was used for bill payments or an automatic fuel dispenser.
          enum:
          - account_funding
          - automatic_fuel_dispenser
          - bill_payment
          - original_credit
          - purchase
          - quasi_cash
          - refund
          - cash_disbursement
          - balance_inquiry
